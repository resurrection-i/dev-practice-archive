<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>标签管理</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/4.6.1/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --pink-primary: #ff6b9d;
            --pink-dark: #e91e63;
        }
        body { 
            background: linear-gradient(135deg, #fff0f6 0%, #ffe4f0 100%);
            min-height: 100vh;
        }
        .navbar {
            background: linear-gradient(135deg, var(--pink-primary) 0%, var(--pink-dark) 100%) !important;
        }
        .sidebar {
            min-height: calc(100vh - 56px);
            background: linear-gradient(180deg, #ff6b9d 0%, #e91e63 100%);
        }
        .sidebar .nav-link {
            color: rgba(255,255,255,0.9);
            padding: 15px 20px;
            border-left: 3px solid transparent;
        }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { 
            background-color: rgba(255,255,255,0.15);
            border-left-color: white;
            color: white;
        }
        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(255, 107, 157, 0.15);
        }
        .color-box { 
            width: 40px; 
            height: 40px; 
            border-radius: 8px; 
            display: inline-block;
            border: 2px solid white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--pink-primary) 0%, var(--pink-dark) 100%) !important;
            border: none !important;
        }
        .btn-info {
            background: #ffc1e3 !important;
            border-color: #ffc1e3 !important;
            color: var(--pink-dark) !important;
        }
        .btn-danger {
            background: var(--pink-primary) !important;
            border-color: var(--pink-primary) !important;
        }
        .modal-header {
            background: linear-gradient(135deg, var(--pink-primary) 0%, var(--pink-dark) 100%);
            color: white;
        }
        .modal-header .close {
            color: white;
            opacity: 0.8;
        }
        .form-control:focus {
            border-color: var(--pink-primary);
            box-shadow: 0 0 0 0.2rem rgba(255, 107, 157, 0.25);
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark">
        <a class="navbar-brand" href="/admin/index"><i class="fas fa-cog"></i> 校园公告管理后台</a>
        <div class="ml-auto">
            <a href="/" class="btn btn-outline-light btn-sm mr-2" target="_blank">前台首页</a>
            <a href="/admin/logout" class="btn btn-outline-light btn-sm">退出</a>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 d-md-block sidebar p-0">
                <div class="nav flex-column">
                    <a class="nav-link" href="/admin/index"><i class="fas fa-tachometer-alt"></i> 数据统计</a>
                    <a class="nav-link" href="/admin/notices"><i class="fas fa-bullhorn"></i> 公告管理</a>
                    <a class="nav-link" href="/admin/categories"><i class="fas fa-folder"></i> 分类管理</a>
                    <a class="nav-link active" href="/admin/tags"><i class="fas fa-tags"></i> 标签管理</a>
                    <a class="nav-link" href="/admin/comments"><i class="fas fa-comments"></i> 评论管理</a>
                    <a class="nav-link" href="/admin/users"><i class="fas fa-users"></i> 用户管理</a>
                    <a class="nav-link" href="/admin/logs"><i class="fas fa-history"></i> 操作日志</a>
                </div>
            </nav>

            <main class="col-md-10 ml-sm-auto px-4 py-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h4><i class="fas fa-tags"></i> 标签管理</h4>
                    <button class="btn btn-primary" data-toggle="modal" data-target="#tagModal" onclick="addTag()">
                        <i class="fas fa-plus"></i> 新增标签
                    </button>
                </div>

                <div class="card">
                    <div class="card-body">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>标签名称</th>
                                    <th>颜色</th>
                                    <th>创建时间</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:if="${#lists.isEmpty(tags)}">
                                    <td colspan="5" class="text-center text-muted">暂无标签数据</td>
                                </tr>
                                <tr th:each="tag : ${tags}">
                                    <td th:text="${tag.id}"></td>
                                    <td><span class="badge" th:text="${tag.name}" th:style="'background-color:' + ${tag.color}"></span></td>
                                    <td>
                                        <span class="color-box" th:style="'background-color:' + ${tag.color}"></span>
                                        <span th:text="${tag.color}"></span>
                                    </td>
                                    <td th:text="${#dates.format(tag.createTime, 'yyyy-MM-dd')}"></td>
                                    <td>
                                        <button class="btn btn-sm btn-info" 
                                                th:attr="data-id=${tag.id},data-name=${tag.name},data-color=${tag.color}"
                                                onclick="editTagData(this)"
                                                data-toggle="modal" data-target="#tagModal">
                                            <i class="fas fa-edit"></i>
                                        </button>
                                        <button class="btn btn-sm btn-danger" 
                                                th:attr="data-id=${tag.id}"
                                                onclick="deleteTagData(this)">
                                            <i class="fas fa-trash"></i>
                                        </button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- 标签模态框 -->
    <div class="modal fade" id="tagModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">新增标签</h5>
                    <button type="button" class="close" data-dismiss="modal">&times;</button>
                </div>
                <div class="modal-body">
                    <form id="tagForm">
                        <input type="hidden" id="tagId">
                        <div class="form-group">
                            <label>标签名称</label>
                            <input type="text" class="form-control" id="tagName" required>
                        </div>
                        <div class="form-group">
                            <label>颜色</label>
                            <input type="color" class="form-control" id="tagColor" value="#409EFF">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="saveTag()">保存</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/4.6.1/js/bootstrap.bundle.min.js"></script>
    <script>
        function addTag() {
            $('#modalTitle').text('新增标签');
            $('#tagId').val('');
            $('#tagName').val('');
            $('#tagColor').val('#409EFF');
        }

        function editTag(id, name, color) {
            $('#modalTitle').text('编辑标签');
            $('#tagId').val(id);
            $('#tagName').val(name);
            $('#tagColor').val(color);
        }

        function saveTag() {
            var data = {
                id: $('#tagId').val() || null,
                name: $('#tagName').val(),
                color: $('#tagColor').val()
            };

            $.ajax({
                url: '/admin/tag/save',
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify(data),
                success: function(res) {
                    if (res.code === 200) {
                        alert('保存成功');
                        location.reload();
                    } else {
                        alert(res.message);
                    }
                }
            });
        }

        function deleteTag(id) {
            if (!confirm('确定要删除这个标签吗？')) return;
            
            $.ajax({
                url: '/admin/tag/' + id,
                type: 'DELETE',
                success: function(res) {
                    if (res.code === 200) {
                        alert('删除成功');
                        location.reload();
                    } else {
                        alert(res.message);
                    }
                }
            });
        }

        function editTagData(btn) {
            var id = $(btn).data('id');
            var name = $(btn).data('name');
            var color = $(btn).data('color');
            editTag(id, name, color);
        }

        function deleteTagData(btn) {
            var id = $(btn).data('id');
            deleteTag(id);
        }
    </script>
</body>
</html>
