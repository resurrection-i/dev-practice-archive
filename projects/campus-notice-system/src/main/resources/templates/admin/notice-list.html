<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>公告管理</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/4.6.1/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --pink-primary: #ff6b9d;
            --pink-dark: #e91e63;
        }
        body { 
            background: linear-gradient(135deg, #fff0f6 0%, #ffe4f0 100%);
            min-height: 100vh;
        }
        .navbar {
            background: linear-gradient(135deg, var(--pink-primary) 0%, var(--pink-dark) 100%) !important;
        }
        .sidebar {
            min-height: calc(100vh - 56px);
            background: linear-gradient(180deg, #ff6b9d 0%, #e91e63 100%);
        }
        .sidebar .nav-link {
            color: rgba(255,255,255,0.9);
            padding: 15px 20px;
            border-left: 3px solid transparent;
        }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { 
            background-color: rgba(255,255,255,0.15);
            border-left-color: white;
            color: white;
        }
        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(255, 107, 157, 0.15);
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--pink-primary) 0%, var(--pink-dark) 100%) !important;
            border: none !important;
        }
        .btn-info {
            background: #ffc1e3 !important;
            border-color: #ffc1e3 !important;
            color: var(--pink-dark) !important;
        }
        .btn-danger {
            background: var(--pink-primary) !important;
            border-color: var(--pink-primary) !important;
        }
        .badge-success {
            background: #67C23A !important;
        }
        .badge-warning {
            background: var(--pink-primary) !important;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark">
        <a class="navbar-brand" href="/admin/index">
            <i class="fas fa-cog"></i> 校园公告管理后台
        </a>
        <div class="ml-auto">
            <a href="/" class="btn btn-outline-light btn-sm mr-2" target="_blank">前台首页</a>
            <a href="/admin/logout" class="btn btn-outline-light btn-sm">退出</a>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 d-md-block sidebar p-0">
                <div class="nav flex-column">
                    <a class="nav-link" href="/admin/index"><i class="fas fa-tachometer-alt"></i> 数据统计</a>
                    <a class="nav-link active" href="/admin/notices"><i class="fas fa-bullhorn"></i> 公告管理</a>
                    <a class="nav-link" href="/admin/categories"><i class="fas fa-folder"></i> 分类管理</a>
                    <a class="nav-link" href="/admin/tags"><i class="fas fa-tags"></i> 标签管理</a>
                    <a class="nav-link" href="/admin/comments"><i class="fas fa-comments"></i> 评论管理</a>
                    <a class="nav-link" href="/admin/users"><i class="fas fa-users"></i> 用户管理</a>
                    <a class="nav-link" href="/admin/logs"><i class="fas fa-history"></i> 操作日志</a>
                </div>
            </nav>

            <main class="col-md-10 ml-sm-auto px-4 py-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h4><i class="fas fa-bullhorn"></i> 公告管理</h4>
                    <a href="/admin/notice/add" class="btn btn-primary">
                        <i class="fas fa-plus"></i> 新增公告
                    </a>
                </div>

                <div class="card">
                    <div class="card-body">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>标题</th>
                                    <th>分类</th>
                                    <th>标签</th>
                                    <th>状态</th>
                                    <th>置顶</th>
                                    <th>浏览量</th>
                                    <th>创建时间</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="notice : ${notices}">
                                    <td th:text="${notice.id}"></td>
                                    <td th:text="${notice.title}"></td>
                                    <td><span class="badge badge-info" th:text="${notice.categoryName}"></span></td>
                                    <td>
                                        <span class="badge badge-secondary mr-1" 
                                              th:each="tag : ${notice.tags}" 
                                              th:text="${tag.name}"></span>
                                    </td>
                                    <td>
                                        <span th:if="${notice.status == 1}" class="badge badge-success">已发布</span>
                                        <span th:if="${notice.status == 0}" class="badge badge-warning">草稿</span>
                                    </td>
                                    <td>
                                        <span th:if="${notice.isTop == 1}" class="badge badge-danger">是</span>
                                        <span th:if="${notice.isTop == 0}" class="badge badge-secondary">否</span>
                                    </td>
                                    <td th:text="${notice.viewCount}"></td>
                                    <td th:text="${#dates.format(notice.createTime, 'yyyy-MM-dd')}"></td>
                                    <td>
                                        <a th:href="@{/admin/notice/edit/{id}(id=${notice.id})}" 
                                           class="btn btn-sm btn-info">
                                            <i class="fas fa-edit"></i>
                                        </a>
                                        <button class="btn btn-sm btn-danger" 
                                                th:onclick="'deleteNotice(' + ${notice.id} + ')'">
                                            <i class="fas fa-trash"></i>
                                        </button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/4.6.1/js/bootstrap.bundle.min.js"></script>
    <script>
        function deleteNotice(id) {
            if (!confirm('确定要删除这条公告吗？')) return;
            
            $.ajax({
                url: '/admin/notice/' + id,
                type: 'DELETE',
                success: function(res) {
                    if (res.code === 200) {
                        alert('删除成功');
                        location.reload();
                    } else {
                        alert(res.message);
                    }
                }
            });
        }
    </script>
</body>
</html>
