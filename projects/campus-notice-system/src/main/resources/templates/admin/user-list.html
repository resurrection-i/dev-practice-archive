<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>用户管理 - 校园公告系统</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/4.6.1/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --pink-primary: #ff6b9d;
            --pink-dark: #e91e63;
        }
        body { 
            background: linear-gradient(135deg, #fff0f6 0%, #ffe4f0 100%);
            min-height: 100vh;
        }
        .navbar {
            background: linear-gradient(135deg, var(--pink-primary) 0%, var(--pink-dark) 100%) !important;
        }
        .sidebar {
            min-height: calc(100vh - 56px);
            background: linear-gradient(180deg, #ff6b9d 0%, #e91e63 100%);
        }
        .sidebar .nav-link {
            color: rgba(255,255,255,0.9);
            padding: 15px 20px;
            border-left: 3px solid transparent;
        }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { 
            background-color: rgba(255,255,255,0.15);
            border-left-color: white;
            color: white;
        }
        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(255, 107, 157, 0.15);
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--pink-primary) 0%, var(--pink-dark) 100%) !important;
            border: none !important;
        }
        .btn-info {
            background: #ffc1e3 !important;
            border-color: #ffc1e3 !important;
            color: var(--pink-dark) !important;
        }
        .btn-danger {
            background: var(--pink-primary) !important;
            border-color: var(--pink-primary) !important;
        }
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
        }
        .badge-admin {
            background: var(--pink-primary) !important;
        }
        .badge-user {
            background: #ffc1e3 !important;
            color: var(--pink-dark) !important;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark">
        <a class="navbar-brand" href="/admin/index">
            <i class="fas fa-cog"></i> 校园公告管理后台
        </a>
        <div class="ml-auto">
            <a href="/" class="btn btn-outline-light btn-sm mr-2" target="_blank">前台首页</a>
            <a href="/admin/logout" class="btn btn-outline-light btn-sm">退出</a>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 d-md-block sidebar p-0">
                <div class="nav flex-column">
                    <a class="nav-link" href="/admin/index"><i class="fas fa-tachometer-alt"></i> 数据统计</a>
                    <a class="nav-link" href="/admin/notices"><i class="fas fa-bullhorn"></i> 公告管理</a>
                    <a class="nav-link" href="/admin/categories"><i class="fas fa-folder"></i> 分类管理</a>
                    <a class="nav-link" href="/admin/tags"><i class="fas fa-tags"></i> 标签管理</a>
                    <a class="nav-link" href="/admin/comments"><i class="fas fa-comments"></i> 评论管理</a>
                    <a class="nav-link active" href="/admin/users"><i class="fas fa-users"></i> 用户管理</a>
                    <a class="nav-link" href="/admin/logs"><i class="fas fa-history"></i> 操作日志</a>
                </div>
            </nav>

            <main class="col-md-10 ml-sm-auto px-4 py-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h4><i class="fas fa-users"></i> 用户管理</h4>
                </div>

                <div class="card">
                    <div class="card-body">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>头像</th>
                                    <th>用户名</th>
                                    <th>昵称</th>
                                    <th>邮箱</th>
                                    <th>电话</th>
                                    <th>角色</th>
                                    <th>注册时间</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="user : ${users}">
                                    <td th:text="${user.id}"></td>
                                    <td>
                                        <img th:src="${user.avatar != null ? user.avatar : '/images/default-avatar.svg'}" 
                                             class="user-avatar" 
                                             alt="头像"
                                             onerror="this.src='/images/default-avatar.svg'">
                                    </td>
                                    <td th:text="${user.username}"></td>
                                    <td th:text="${user.nickname}"></td>
                                    <td th:text="${user.email}"></td>
                                    <td th:text="${user.phone}"></td>
                                    <td>
                                        <span th:if="${user.role == 'ADMIN'}" class="badge badge-admin">管理员</span>
                                        <span th:if="${user.role == 'USER'}" class="badge badge-user">普通用户</span>
                                    </td>
                                    <td th:text="${#dates.format(user.createTime, 'yyyy-MM-dd')}"></td>
                                    <td>
                                        <button class="btn btn-sm btn-info" 
                                                th:if="${user.role == 'USER'}"
                                                th:attr="data-id=${user.id}"
                                                onclick="toggleRole(this, 'ADMIN')">
                                            <i class="fas fa-user-shield"></i> 设为管理员
                                        </button>
                                        <button class="btn btn-sm btn-secondary" 
                                                th:if="${user.role == 'ADMIN' && user.id != 1}"
                                                th:attr="data-id=${user.id}"
                                                onclick="toggleRole(this, 'USER')">
                                            <i class="fas fa-user"></i> 设为普通用户
                                        </button>
                                        <button class="btn btn-sm btn-danger" 
                                                th:if="${user.id != 1}"
                                                th:attr="data-id=${user.id}"
                                                onclick="deleteUser(this)">
                                            <i class="fas fa-trash"></i> 删除
                                        </button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/4.6.1/js/bootstrap.bundle.min.js"></script>
    <script>
        function toggleRole(btn, newRole) {
            var userId = $(btn).data('id');
            var roleText = newRole == 'ADMIN' ? '管理员' : '普通用户';
            
            if (!confirm('确定要将该用户设为' + roleText + '吗？')) {
                return;
            }

            $.ajax({
                url: '/admin/user/' + userId + '/role',
                type: 'PUT',
                contentType: 'application/json',
                data: JSON.stringify({role: newRole}),
                success: function(res) {
                    if (res.code === 200) {
                        alert('操作成功');
                        location.reload();
                    } else {
                        alert(res.message);
                    }
                },
                error: function() {
                    alert('操作失败，请重试');
                }
            });
        }

        function deleteUser(btn) {
            if (!confirm('确定要删除该用户吗？删除后将无法恢复！')) {
                return;
            }

            var userId = $(btn).data('id');
            $.ajax({
                url: '/admin/user/' + userId,
                type: 'DELETE',
                success: function(res) {
                    if (res.code === 200) {
                        alert('删除成功');
                        location.reload();
                    } else {
                        alert(res.message);
                    }
                },
                error: function() {
                    alert('删除失败，请重试');
                }
            });
        }
    </script>
</body>
</html>
