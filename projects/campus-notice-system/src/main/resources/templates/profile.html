<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心 - 校园公告系统</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/4.6.1/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    <style>
        /* 粉色主题配色 */
        :root {
            --pink-primary: #ff6b9d;
            --pink-secondary: #ffc1e3;
            --pink-light: #fff0f6;
            --pink-dark: #e91e63;
        }
        
        body { 
            background: linear-gradient(135deg, #fff0f6 0%, #ffe4f0 100%);
            min-height: 100vh;
        }
        
        .navbar { 
            background: linear-gradient(135deg, var(--pink-primary) 0%, var(--pink-dark) 100%) !important;
            box-shadow: 0 2px 8px rgba(255, 107, 157, 0.3);
        }
        
        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(255, 107, 157, 0.15);
        }
        
        .avatar-preview {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--pink-primary);
            box-shadow: 0 4px 16px rgba(255, 107, 157, 0.3);
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .avatar-preview:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(255, 107, 157, 0.4);
            border-color: var(--pink-dark);
        }
        
        .avatar-upload-area {
            position: relative;
        }
        
        .avatar-upload-overlay {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(255, 107, 157, 0.9) 0%, rgba(233, 30, 99, 0.9) 100%);
            display: none;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
            cursor: pointer;
        }
        
        .avatar-upload-area:hover .avatar-upload-overlay {
            display: flex;
        }
        
        .info-card {
            border-left: 4px solid var(--pink-primary);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--pink-primary) 0%, var(--pink-dark) 100%) !important;
            border: none !important;
        }
        
        .btn-primary:hover {
            background: linear-gradient(135deg, var(--pink-dark) 0%, #c44569 100%) !important;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 107, 157, 0.3);
        }
        
        .btn-success {
            background: linear-gradient(135deg, #ff6b9d 0%, #ff8fab 100%) !important;
            border: none !important;
        }
        
        .badge-danger {
            background: var(--pink-primary) !important;
        }
        
        .badge-success {
            background: var(--pink-secondary) !important;
            color: var(--pink-dark) !important;
        }
        
        .badge-primary {
            background: var(--pink-primary) !important;
        }
        
        .card-header {
            background: var(--pink-light) !important;
            border-bottom: 2px solid var(--pink-secondary) !important;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fas fa-graduation-cap"></i> 校园公告系统
            </a>
            <div class="ml-auto">
                <a href="/" class="btn btn-outline-light btn-sm">
                    <i class="fas fa-arrow-left"></i> 返回首页
                </a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-3">
                <div class="card">
                    <div class="card-body text-center">
                        <div class="avatar-upload-area mb-3">
                            <img th:src="${user.avatar != null && !user.avatar.isEmpty() ? user.avatar : '/images/default-avatar.svg'}" 
                                 class="avatar-preview" 
                                 alt="头像" 
                                 id="avatarImg" 
                                 onclick="$('#avatarFile').click()"
                                 onerror="this.src='/images/default-avatar.svg'">
                            <div class="avatar-upload-overlay" onclick="$('#avatarFile').click()">
                                <div>
                                    <i class="fas fa-camera fa-2x"></i>
                                    <div class="mt-2">点击更换</div>
                                </div>
                            </div>
                        </div>
                        <h4 class="mt-3">
                            <span th:text="${user.nickname}"></span>
                            <span class="badge badge-danger ml-2" th:if="${user.role == 'ADMIN'}">管理员</span>
                        </h4>
                        <p class="text-muted mb-1" th:text="${user.username}"></p>
                        <small class="text-muted" th:if="${user.email != null && !user.email.isEmpty()}">
                            <i class="fas fa-envelope"></i> <span th:text="${user.email}"></span>
                        </small>
                        <input type="file" id="avatarFile" accept="image/jpeg,image/png,image/jpg,image/gif" style="display:none">
                        <div class="mt-3">
                            <button class="btn btn-sm btn-primary btn-block" onclick="$('#avatarFile').click()">
                                <i class="fas fa-upload"></i> 更换头像
                            </button>
                            <a th:if="${user.role == 'ADMIN'}" href="/admin/index" class="btn btn-sm btn-success btn-block mt-2">
                                <i class="fas fa-cog"></i> 后台管理
                            </a>
                        </div>
                    </div>
                </div>
                
                <!-- 账户信息卡片 -->
                <div class="card mt-3">
                    <div class="card-header bg-light">
                        <h6 class="mb-0"><i class="fas fa-info-circle"></i> 账户信息</h6>
                    </div>
                    <div class="card-body">
                        <div class="mb-2">
                            <small class="text-muted">注册时间</small>
                            <div th:text="${#dates.format(user.createTime, 'yyyy-MM-dd')}"></div>
                        </div>
                        <div class="mb-2">
                            <small class="text-muted">账户状态</small>
                            <div>
                                <span class="badge badge-success" th:if="${user.status == 1}">正常</span>
                                <span class="badge badge-danger" th:if="${user.status == 0}">禁用</span>
                            </div>
                        </div>
                        <div>
                            <small class="text-muted">角色</small>
                            <div>
                                <span class="badge badge-primary" th:if="${user.role == 'ADMIN'}">管理员</span>
                                <span class="badge badge-secondary" th:if="${user.role == 'USER'}">普通用户</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-9">
                <div class="card">
                    <div class="card-header">
                        <h5><i class="fas fa-user-edit"></i> 个人资料</h5>
                    </div>
                    <div class="card-body">
                        <form id="profileForm">
                            <div class="form-group">
                                <label>用户名</label>
                                <input type="text" class="form-control" th:value="${user.username}" disabled>
                            </div>
                            <div class="form-group">
                                <label>昵称</label>
                                <input type="text" class="form-control" name="nickname" th:value="${user.nickname}" required>
                            </div>
                            <div class="form-group">
                                <label>邮箱</label>
                                <input type="email" class="form-control" name="email" th:value="${user.email}">
                            </div>
                            <div class="form-group">
                                <label>手机号</label>
                                <input type="text" class="form-control" name="phone" th:value="${user.phone}">
                            </div>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save"></i> 保存修改
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/4.6.1/js/bootstrap.bundle.min.js"></script>
    <script>
        // 上传头像
        $('#avatarFile').change(function() {
            var file = this.files[0];
            if (!file) return;
            
            // 验证文件类型
            if (!file.type.match('image.*')) {
                alert('请选择图片文件！');
                return;
            }
            
            // 验证文件大小（最大5MB）
            if (file.size > 5 * 1024 * 1024) {
                alert('图片大小不能超过5MB！');
                return;
            }
            
            // 预览图片
            var reader = new FileReader();
            reader.onload = function(e) {
                $('#avatarImg').attr('src', e.target.result);
            };
            reader.readAsDataURL(file);
            
            // 上传图片
            var formData = new FormData();
            formData.append('file', file);
            
            // 显示上传提示
            var uploadBtn = $('.btn-primary:contains("更换头像")');
            var originalText = uploadBtn.html();
            uploadBtn.html('<i class="fas fa-spinner fa-spin"></i> 上传中...').prop('disabled', true);
            
            $.ajax({
                url: '/user/uploadAvatar',
                type: 'POST',
                data: formData,
                processData: false,
                contentType: false,
                success: function(res) {
                    if (res.code === 200) {
                        alert('头像上传成功！');
                        location.reload();
                    } else {
                        alert(res.message);
                        uploadBtn.html(originalText).prop('disabled', false);
                    }
                },
                error: function() {
                    alert('上传失败，请重试！');
                    uploadBtn.html(originalText).prop('disabled', false);
                }
            });
        });

        // 更新资料
        $('#profileForm').submit(function(e) {
            e.preventDefault();
            
            var formData = {
                nickname: $('[name="nickname"]').val(),
                email: $('[name="email"]').val(),
                phone: $('[name="phone"]').val()
            };
            
            $.ajax({
                url: '/user/updateProfile',
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify(formData),
                success: function(res) {
                    if (res.code === 200) {
                        alert('更新成功');
                        location.reload();
                    } else {
                        alert(res.message);
                    }
                }
            });
        });
    </script>
</body>
</html>
