<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${notice.title}">公告详情</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/4.6.1/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    <style>
        /* 粉色主题配色 */
        :root {
            --pink-primary: #ff6b9d;
            --pink-secondary: #ffc1e3;
            --pink-light: #fff0f6;
            --pink-dark: #e91e63;
        }
        
        body { 
            background: linear-gradient(135deg, #fff0f6 0%, #ffe4f0 100%);
            min-height: 100vh;
        }
        
        .navbar { 
            background: linear-gradient(135deg, var(--pink-primary) 0%, var(--pink-dark) 100%) !important;
            box-shadow: 0 2px 8px rgba(255, 107, 157, 0.3);
        }
        
        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(255, 107, 157, 0.15);
        }
        
        .card-header {
            background: linear-gradient(135deg, var(--pink-primary) 0%, var(--pink-dark) 100%) !important;
            color: white !important;
            border-radius: 12px 12px 0 0 !important;
        }
        
        .notice-content { 
            line-height: 2; 
            font-size: 16px; 
            white-space: pre-wrap;
        }
        
        .notice-cover { 
            max-width: 100%; 
            height: auto; 
            margin: 20px 0;
            border-radius: 8px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--pink-primary) 0%, var(--pink-dark) 100%) !important;
            border: none !important;
        }
        
        .btn-primary:hover {
            background: linear-gradient(135deg, var(--pink-dark) 0%, #c44569 100%) !important;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 107, 157, 0.3);
        }
        
        .btn-outline-warning {
            border-color: var(--pink-primary) !important;
            color: var(--pink-primary) !important;
        }
        
        .btn-outline-warning:hover, .btn-warning {
            background: var(--pink-primary) !important;
            border-color: var(--pink-primary) !important;
            color: white !important;
        }
        
        .badge-primary {
            background: var(--pink-primary) !important;
        }
        
        .badge-info {
            background: var(--pink-secondary) !important;
            color: var(--pink-dark) !important;
        }
        
        .media {
            border-bottom-color: var(--pink-light) !important;
        }
        
        .btn-outline-danger {
            border-color: var(--pink-primary) !important;
            color: var(--pink-primary) !important;
        }
        
        .btn-outline-danger:hover {
            background: var(--pink-primary) !important;
            color: white !important;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fas fa-graduation-cap"></i> 校园公告系统
            </a>
            <div class="ml-auto">
                <a href="/" class="btn btn-outline-light btn-sm">
                    <i class="fas fa-arrow-left"></i> 返回首页
                </a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="card">
            <div class="card-body">
                <!-- 标题 -->
                <h2 class="card-title mb-3" th:text="${notice.title}"></h2>
                
                <!-- 元信息 -->
                <div class="mb-3 pb-3 border-bottom">
                    <span class="badge badge-primary mr-2" th:text="${notice.categoryName}"></span>
                    <span class="badge badge-secondary tag-badge mr-1" 
                          th:each="tag : ${notice.tags}" 
                          th:text="${tag.name}"
                          th:style="'background-color:' + ${tag.color}"></span>
                    <span class="badge badge-danger" th:if="${notice.isTop == 1}">置顶</span>
                    
                    <div class="mt-2 text-muted">
                        <i class="fas fa-user"></i> <span th:text="${notice.authorName}"></span>
                        <i class="fas fa-clock ml-3"></i> <span th:text="${#dates.format(notice.createTime, 'yyyy-MM-dd HH:mm:ss')}"></span>
                        <i class="fas fa-eye ml-3"></i> <span th:text="${notice.viewCount}"></span>
                    </div>
                </div>

                <!-- 封面图片 -->
                <div th:if="${notice.coverImage != null && !notice.coverImage.isEmpty()}">
                    <img th:src="${notice.coverImage}" class="notice-cover" alt="封面图片">
                </div>

                <!-- 内容 -->
                <div class="notice-content" th:text="${notice.content}"></div>

                <!-- 操作按钮 -->
                <div class="mt-4 pt-3 border-top">
                    <button th:if="${session.user != null}" 
                            th:onclick="'toggleFavorite(' + ${notice.id} + ')'"
                            th:classappend="${isFavorite} ? 'btn-warning' : 'btn-outline-warning'"
                            class="btn" id="favoriteBtn">
                        <i class="fas fa-star"></i> 
                        <span th:text="${isFavorite} ? '已收藏' : '收藏'"></span>
                    </button>
                    <a th:if="${session.user == null}" href="/user/login" class="btn btn-outline-warning">
                        <i class="fas fa-star"></i> 登录后收藏
                    </a>
                </div>
            </div>

            <!-- 评论区 -->
            <div class="card mt-4">
                <div class="card-header bg-light">
                    <h5 class="mb-0"><i class="fas fa-comments"></i> 评论区 <span class="badge badge-primary" id="commentCount">0</span></h5>
                </div>
                <div class="card-body">
                    <!-- 发表评论表单 -->
                    <div th:if="${user != null}" class="mb-4">
                        <div class="form-group">
                            <textarea class="form-control" id="commentContent" rows="3" placeholder="写下你的评论..." maxlength="500"></textarea>
                            <small class="text-muted">最多500字</small>
                        </div>
                        <button class="btn btn-primary" onclick="submitComment()">
                            <i class="fas fa-paper-plane"></i> 发表评论
                        </button>
                    </div>
                    <div th:if="${user == null}" class="alert alert-info">
                        <i class="fas fa-info-circle"></i> 请 <a href="/user/login">登录</a> 后发表评论
                    </div>

                    <!-- 评论列表 -->
                    <div id="commentList">
                        <div class="text-center text-muted py-3">
                            <i class="fas fa-spinner fa-spin"></i> 加载中...
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-light text-center py-4 mt-5">
        <div class="container">
            <p class="text-muted mb-0">© 2025 校园公告信息管理系统</p>
        </div>
    </footer>

    <script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/4.6.1/js/bootstrap.bundle.min.js"></script>
    <script th:inline="javascript">
        var isFavorite = /*[[${isFavorite}]]*/ false;
        var noticeId = /*[[${notice.id}]]*/ 0;
        var currentUserId = /*[[${user != null ? user.id : null}]]*/ null;
        var isAdmin = /*[[${user != null && user.role == 'ADMIN'}]]*/ false;

        // 页面加载时获取评论列表
        $(document).ready(function() {
            loadComments();
        });

        // 加载评论列表
        function loadComments() {
            $.ajax({
                url: '/comment/list/' + noticeId,
                type: 'GET',
                success: function(res) {
                    if (res.code === 200) {
                        displayComments(res.data);
                        $('#commentCount').text(res.data.length);
                    } else {
                        $('#commentList').html('<div class="alert alert-danger">加载评论失败</div>');
                    }
                },
                error: function() {
                    $('#commentList').html('<div class="alert alert-danger">加载评论失败</div>');
                }
            });
        }

        // 显示评论列表
        function displayComments(comments) {
            if (comments.length === 0) {
                $('#commentList').html('<div class="text-center text-muted py-3">暂无评论，快来抢沙发吧！</div>');
                return;
            }

            var html = '';
            comments.forEach(function(comment) {
                var avatar = comment.avatar || '/images/default-avatar.svg';
                var nickname = comment.nickname || comment.username;
                var createTime = new Date(comment.createTime).toLocaleString('zh-CN');
                
                html += '<div class="media mb-3 pb-3 border-bottom">';
                html += '  <img src="' + avatar + '" class="mr-3 rounded-circle" width="48" height="48" alt="头像" onerror="this.src=\'/images/default-avatar.svg\'">';
                html += '  <div class="media-body">';
                html += '    <h6 class="mt-0">' + nickname + ' <small class="text-muted">' + createTime + '</small></h6>';
                html += '    <p class="mb-1">' + escapeHtml(comment.content) + '</p>';
                
                // 显示删除按钮（用户自己的评论或管理员）
                if (currentUserId && (comment.userId === currentUserId || isAdmin)) {
                    html += '    <button class="btn btn-sm btn-outline-danger" onclick="deleteComment(' + comment.id + ')">';
                    html += '      <i class="fas fa-trash"></i> 删除';
                    html += '    </button>';
                }
                
                html += '  </div>';
                html += '</div>';
            });

            $('#commentList').html(html);
        }

        // 发表评论
        function submitComment() {
            var content = $('#commentContent').val().trim();
            if (!content) {
                alert('请输入评论内容');
                return;
            }

            $.ajax({
                url: '/comment/add',
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({
                    noticeId: noticeId,
                    content: content
                }),
                success: function(res) {
                    if (res.code === 200) {
                        $('#commentContent').val('');
                        loadComments();
                        alert('评论成功！');
                    } else {
                        alert(res.message);
                    }
                },
                error: function() {
                    alert('评论失败，请重试');
                }
            });
        }

        // 删除评论
        function deleteComment(commentId) {
            if (!confirm('确定要删除这条评论吗？')) {
                return;
            }

            $.ajax({
                url: '/comment/' + commentId,
                type: 'DELETE',
                success: function(res) {
                    if (res.code === 200) {
                        loadComments();
                        alert('删除成功');
                    } else {
                        alert(res.message);
                    }
                },
                error: function() {
                    alert('删除失败，请重试');
                }
            });
        }

        // HTML转义，防止XSS
        function escapeHtml(text) {
            var map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, function(m) { return map[m]; });
        }

        function toggleFavorite(noticeId) {
            if (isFavorite) {
                // 取消收藏
                $.ajax({
                    url: '/user/favorite/' + noticeId,
                    type: 'DELETE',
                    success: function(res) {
                        if (res.code === 200) {
                            isFavorite = false;
                            $('#favoriteBtn').removeClass('btn-warning').addClass('btn-outline-warning');
                            $('#favoriteBtn span').text('收藏');
                            alert('取消收藏成功');
                        } else {
                            alert(res.message);
                        }
                    }
                });
            } else {
                // 添加收藏
                $.ajax({
                    url: '/user/favorite/' + noticeId,
                    type: 'POST',
                    success: function(res) {
                        if (res.code === 200) {
                            isFavorite = true;
                            $('#favoriteBtn').removeClass('btn-outline-warning').addClass('btn-warning');
                            $('#favoriteBtn span').text('已收藏');
                            alert('收藏成功');
                        } else {
                            alert(res.message);
                        }
                    }
                });
            }
        }
    </script>
</body>
</html>
