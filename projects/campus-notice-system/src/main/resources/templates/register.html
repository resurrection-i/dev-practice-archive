<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户注册 - 校园公告系统</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/4.6.1/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    <style>
        /* 粉色主题配色 - 注册页 */
        :root {
            --pink-primary: #ff6b9d;
            --pink-dark: #e91e63;
        }
        
        body {
            background: linear-gradient(135deg, #ff6b9d 0%, #e91e63 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            position: relative;
            overflow: hidden;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: float 20s linear infinite;
        }
        
        @keyframes float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }
        
        .register-card {
            max-width: 450px;
            margin: 0 auto;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(255, 107, 157, 0.4);
            border: none;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            position: relative;
            z-index: 1;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--pink-primary) 0%, var(--pink-dark) 100%) !important;
            border: none !important;
            padding: 12px;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.3s;
        }
        
        .btn-primary:hover {
            background: linear-gradient(135deg, var(--pink-dark) 0%, #c44569 100%) !important;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 107, 157, 0.4);
        }
        
        .text-primary {
            color: var(--pink-primary) !important;
        }
        
        .form-control:focus {
            border-color: var(--pink-primary);
            box-shadow: 0 0 0 0.2rem rgba(255, 107, 157, 0.25);
        }
        
        h3 {
            color: var(--pink-dark);
            font-weight: 600;
        }
        
        a {
            color: var(--pink-primary);
        }
        
        a:hover {
            color: var(--pink-dark);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card register-card">
            <div class="card-body p-5">
                <h3 class="text-center mb-4">
                    <i class="fas fa-user-plus text-primary"></i> 用户注册
                </h3>
                <form id="registerForm">
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> 用户名</label>
                        <input type="text" class="form-control" name="username" required minlength="3">
                        <small class="form-text text-muted">至少3个字符</small>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-lock"></i> 密码</label>
                        <input type="password" class="form-control" name="password" id="password" required minlength="6">
                        <small class="form-text text-muted">至少6个字符</small>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-lock"></i> 确认密码</label>
                        <input type="password" class="form-control" id="confirmPassword" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-id-card"></i> 昵称</label>
                        <input type="text" class="form-control" name="nickname" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-envelope"></i> 邮箱（选填）</label>
                        <input type="email" class="form-control" name="email">
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">
                        <i class="fas fa-check"></i> 注册
                    </button>
                </form>
                <div class="text-center mt-3">
                    <a href="/user/login">已有账号？立即登录</a> | 
                    <a href="/">返回首页</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/4.6.1/js/bootstrap.bundle.min.js"></script>
    <script>
        $('#registerForm').submit(function(e) {
            e.preventDefault();
            
            var password = $('#password').val();
            var confirmPassword = $('#confirmPassword').val();
            
            if (password !== confirmPassword) {
                alert('两次密码输入不一致');
                return;
            }
            
            var formData = {
                username: $('[name="username"]').val(),
                password: password,
                nickname: $('[name="nickname"]').val(),
                email: $('[name="email"]').val()
            };
            
            $.ajax({
                url: '/user/register',
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify(formData),
                success: function(res) {
                    if (res.code === 200) {
                        alert('注册成功，请登录');
                        window.location.href = '/user/login';
                    } else {
                        alert(res.message);
                    }
                }
            });
        });
    </script>
</body>
</html>
