<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的收藏 - 校园公告系统</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/4.6.1/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    <style>
        /* 粉色主题配色 */
        :root {
            --pink-primary: #ff6b9d;
            --pink-secondary: #ffc1e3;
            --pink-light: #fff0f6;
            --pink-dark: #e91e63;
        }
        
        body { 
            background: linear-gradient(135deg, #fff0f6 0%, #ffe4f0 100%);
            min-height: 100vh;
        }
        
        .navbar { 
            background: linear-gradient(135deg, var(--pink-primary) 0%, var(--pink-dark) 100%) !important;
            box-shadow: 0 2px 8px rgba(255, 107, 157, 0.3);
        }
        
        .favorite-card { 
            transition: all 0.3s; 
            margin-bottom: 20px;
            border: none;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(255, 107, 157, 0.15);
            background: white;
        }
        
        .favorite-card:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 8px 24px rgba(255, 107, 157, 0.25);
        }
        
        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #fff;
            margin-right: 8px;
            vertical-align: middle;
        }
        
        .nav-link-with-avatar {
            display: flex;
            align-items: center;
        }
        
        .badge-danger {
            background: var(--pink-primary) !important;
        }
        
        .badge-warning {
            background: var(--pink-secondary) !important;
            color: var(--pink-dark) !important;
        }
        
        .text-warning {
            color: var(--pink-primary) !important;
        }
        
        .btn-danger {
            background: var(--pink-primary) !important;
            border-color: var(--pink-primary) !important;
        }
        
        .btn-danger:hover {
            background: var(--pink-dark) !important;
            border-color: var(--pink-dark) !important;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fas fa-graduation-cap"></i> 校园公告系统
            </a>
            <div class="ml-auto">
                <a href="/" class="btn btn-outline-light btn-sm">
                    <i class="fas fa-arrow-left"></i> 返回首页
                </a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h4 class="mb-4"><i class="fas fa-star text-warning"></i> 我的收藏</h4>
        
        <div th:if="${favorites == null || favorites.isEmpty()}" class="alert alert-info text-center">
            <i class="fas fa-info-circle"></i> 还没有收藏任何公告
        </div>

        <div class="row">
            <div class="col-md-6" th:each="favorite : ${favorites}">
                <div class="card favorite-card">
                    <div class="card-body">
                        <h5 class="card-title">
                            <a th:href="@{/notice/{id}(id=${favorite.notice.id})}" 
                               th:text="${favorite.notice.title}"></a>
                        </h5>
                        <p class="card-text text-muted" 
                           th:text="${#strings.abbreviate(favorite.notice.content, 100)}"></p>
                        <div class="d-flex justify-content-between align-items-center">
                            <small class="text-muted">
                                <i class="fas fa-folder"></i> <span th:text="${favorite.notice.categoryName}"></span>
                            </small>
                            <div>
                                <small class="text-muted mr-3" 
                                       th:text="'收藏于 ' + ${#dates.format(favorite.createTime, 'yyyy-MM-dd')}"></small>
                                <button class="btn btn-sm btn-danger" 
                                        th:onclick="'removeFavorite(' + ${favorite.notice.id} + ')'">
                                    <i class="fas fa-trash"></i> 取消收藏
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/4.6.1/js/bootstrap.bundle.min.js"></script>
    <script>
        function removeFavorite(noticeId) {
            if (!confirm('确定要取消收藏吗？')) return;
            
            $.ajax({
                url: '/user/favorite/' + noticeId,
                type: 'DELETE',
                success: function(res) {
                    if (res.code === 200) {
                        alert('取消收藏成功');
                        location.reload();
                    } else {
                        alert(res.message);
                    }
                }
            });
        }
    </script>
</body>
</html>
